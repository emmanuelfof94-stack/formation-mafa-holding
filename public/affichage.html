<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borne QR Code — Service Qualité</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(160deg,#0d1f2d 0%,#1A5676 100%);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    color:white;
  }
  .container {
    display:flex; flex-direction:column; align-items:center; gap:24px;
    padding:40px; max-width:480px; width:100%; text-align:center;
  }
  .service { font-size:0.7rem; letter-spacing:4px; opacity:0.5; text-transform:uppercase; }
  h1 { font-size:2rem; font-weight:800; letter-spacing:1px; }
  .instruction { font-size:1rem; opacity:0.7; line-height:1.6; }

  .qr-wrapper {
    background:white; border-radius:20px; padding:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    position:relative;
  }
  #qrcode { width:260px; height:260px; }
  #qrcode img, #qrcode canvas { width:260px !important; height:260px !important; }

  .pulse-ring {
    position:absolute; inset:-8px; border-radius:26px;
    border:3px solid rgba(126,200,227,0.4);
    animation:pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:0.4;transform:scale(1);}
    50%{opacity:1;transform:scale(1.015);}
  }

  .url-box {
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
    border-radius:12px; padding:12px 20px; font-family:monospace;
    font-size:0.9rem; color:#7ec8e3; word-break:break-all;
  }

  .heure {
    font-size:3rem; font-weight:700; font-variant-numeric:tabular-nums;
    letter-spacing:2px; color:#7ec8e3;
  }
  .date-txt { font-size:0.9rem; opacity:0.6; margin-top:-16px; }

  .steps {
    display:flex; gap:20px; justify-content:center; flex-wrap:wrap;
  }
  .step-item {
    display:flex; flex-direction:column; align-items:center; gap:6px;
    background:rgba(255,255,255,0.06); border-radius:14px; padding:14px 18px;
    border:1px solid rgba(255,255,255,0.1); min-width:100px;
  }
  .step-num { font-size:1.5rem; }
  .step-txt { font-size:0.75rem; opacity:0.65; text-align:center; line-height:1.4; }
</style>
</head>
<body>
<div class="container">
  <div class="service">Service Gestion Qualité</div>
  <h1>BADGEAGE</h1>

  <div class="heure" id="heure"></div>
  <div class="date-txt" id="date-txt"></div>

  <div class="instruction">Scannez ce QR Code avec votre téléphone<br>pour enregistrer votre arrivée ou départ</div>

  <div class="qr-wrapper">
    <div class="pulse-ring"></div>
    <div id="qrcode"></div>
  </div>

  <div class="url-box" id="url-box">Chargement...</div>

  <div class="steps">
    <div class="step-item"><div class="step-num">📷</div><div class="step-txt">Ouvrez l'appareil photo</div></div>
    <div class="step-item"><div class="step-num">🔍</div><div class="step-txt">Scannez le QR Code</div></div>
    <div class="step-item"><div class="step-num">✅</div><div class="step-txt">Confirmez votre nom</div></div>
  </div>
</div>

<script>
// Horloge
function majHeure() {
  const now = new Date();
  const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const mois = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('heure').textContent = now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('date-txt').textContent =
    `${jours[now.getDay()]} ${now.getDate()} ${mois[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(majHeure, 1000); majHeure();

// Générer QR Code depuis l'IP du serveur
async function genererQR() {
  try {
    const resp = await fetch('/api/infos');
    const { url } = await resp.json();
    document.getElementById('url-box').textContent = url;
    new QRCode(document.getElementById('qrcode'), {
      text: url,
      width: 260, height: 260,
      colorDark: '#0d1f2d',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  } catch(e) {
    document.getElementById('url-box').textContent = 'Erreur de connexion';
  }
}
genererQR();
</script>
</body>
</html>
